<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda | Preview</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-white: #ffffff;
            --text-white-90: rgba(255, 255, 255, 0.9);
            --text-white-60: rgba(255, 255, 255, 0.6);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        .container {
            height: 400vh;
            position: relative;
        }
        .sticky-wrapper {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .overlay-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .text-section {
            position: absolute;
            text-align: center;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
        h1 {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            color: var(--text-white-90);
            margin-bottom: 1rem;
        }
        h2 {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            color: var(--text-white-90);
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-white-60);
            font-weight: 300;
        }
        p.body-text {
            text-transform: none;
            letter-spacing: normal;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            color: #fff;
            font-family: monospace;
            background: #050505;
        }
        .separator {
            width: 50px;
            height: 2px;
            background: rgba(255,255,255,0.2);
            margin: 1.5rem auto 0;
        }
        /* Mobile adjustments */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-wrapper">
        <div id="loader" class="loading">INITIALIZING SYSTEM... 0%</div>
        <canvas id="canvas"></canvas>
        
        <div class="overlay-container">
            <!-- Frame 1 -->
            <div id="text1" class="text-section">
                <h1>GARUDA.</h1>
                <p>Autonomous. Tactical. Unstoppable.</p>
            </div>
            
            <!-- Frame 2 -->
            <div id="text2" class="text-section">
                <h2>Designed for Precision.</h2>
                <div class="separator"></div>
            </div>

            <!-- Frame 3 -->
            <div id="text3" class="text-section">
                <h2>Intelligence Inside.</h2>
                <p class="body-text">Next-gen sensors merged with aerospace-grade avionics.</p>
            </div>

            <!-- Frame 4 -->
            <div id="text4" class="text-section">
                <h2>Command the Sky.</h2>
                <div style="margin-top: 20px;">
                    <button style="padding: 12px 32px; background: white; color: black; border: none; font-weight: 600; cursor: pointer; pointer-events: auto;">PRE-ORDER NOW</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const loader = document.getElementById('loader');
    
    // Config matches current assets
    const FRAME_COUNT = 40; 
    const images = [];
    let imagesLoaded = 0;
    
    // UI Elements
    const text1 = document.getElementById('text1');
    const text2 = document.getElementById('text2');
    const text3 = document.getElementById('text3');
    const text4 = document.getElementById('text4');

    function updateLoader() {
        const progress = Math.round((imagesLoaded / FRAME_COUNT) * 100);
        loader.textContent = `INITIALIZING SYSTEM... ${progress}%`;
        if (imagesLoaded === FRAME_COUNT) {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
            init();
        }
    }

    // Preload
    for (let i = 1; i <= FRAME_COUNT; i++) {
        const img = new Image();
        // Zero pad to 3 digits matches the ezgif filenames
        const num = i.toString().padStart(3, '0');
        img.src = `/public/frames/ezgif-frame-${num}.jpg`;
        img.onload = () => {
            imagesLoaded++;
            updateLoader();
        };
        img.onerror = (e) => {
            console.error('Error loading', img.src);
            imagesLoaded++;
            updateLoader();
        };
        images.push(img);
    }

    let currentFrameIndex = 0;

    function render(index) {
        if (!images[index]) return;
        
        const img = images[index];
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        
        // Contain logic
        const imgRatio = img.width / img.height;
        const canvasRatio = rect.width / rect.height;
        
        let drawW, drawH, x, y;
        
        if (canvasRatio > imgRatio) {
            drawH = rect.height;
            drawW = rect.height * imgRatio;
            x = (rect.width - drawW) / 2;
            y = 0;
        } else {
            drawW = rect.width;
            drawH = rect.width / imgRatio;
            x = 0;
            y = (rect.height - drawH) / 2;
        }
        
        ctx.drawImage(img, x, y, drawW, drawH);
    }

    function updateText(progress) {
        // Helper to set style
        const setStyle = (el, opacity, y) => {
            el.style.opacity = opacity;
            el.style.transform = `translateY(${y}px)`;
        };

        // Frame 1: 0 - 0.15
        if (progress < 0.15) {
            setStyle(text1, 1 - (progress / 0.15), - (progress / 0.15) * 50);
        } else {
            setStyle(text1, 0, -50);
        }

        // Frame 2: 0.2 - 0.3 - 0.4
        if (progress >= 0.2 && progress < 0.4) {
            let opacity = 0;
            let y = 50;
            if (progress < 0.3) { // Fade in
                const p = (progress - 0.2) / 0.1;
                opacity = p;
                y = 50 - (p * 50);
            } else { // Fade out
                const p = (progress - 0.3) / 0.1;
                opacity = 1 - p;
                y = 0 - (p * 50);
            }
            setStyle(text2, opacity, y);
        } else {
            setStyle(text2, 0, 50);
        }

        // Frame 3: 0.5 - 0.6 - 0.7
         if (progress >= 0.5 && progress < 0.7) {
            let opacity = 0;
            let y = 50;
            if (progress < 0.6) { // Fade in
                const p = (progress - 0.5) / 0.1;
                opacity = p;
                y = 50 - (p * 50);
            } else { // Fade out
                const p = (progress - 0.6) / 0.1;
                opacity = 1 - p;
                y = 0 - (p * 50);
            }
            setStyle(text3, opacity, y);
        } else {
            setStyle(text3, 0, 50);
        }

        // Frame 4: 0.8 - 1.0
        if (progress >= 0.8) {
             const p = Math.min(1, (progress - 0.8) / 0.1);
             setStyle(text4, p, 50 - (p * 50));
        } else {
            setStyle(text4, 0, 50);
        }
    }

    function init() {
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const maxScroll = document.body.scrollHeight - window.innerHeight;
            const progress = Math.max(0, Math.min(1, scrollTop / maxScroll));
            
            const index = Math.min(
                FRAME_COUNT - 1, 
                Math.round(progress * (FRAME_COUNT - 1))
            );
            
            if (index !== currentFrameIndex) {
                currentFrameIndex = index;
                requestAnimationFrame(() => render(currentFrameIndex));
            }
            
            updateText(progress);
        });
        
        // Initial render
        render(0);
        updateText(0);
        
        // Resize handler
        window.addEventListener('resize', () => requestAnimationFrame(() => render(currentFrameIndex)));
    }
</script>
</body>
</html>
